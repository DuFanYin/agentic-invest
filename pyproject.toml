[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]
exclude = [".venv", "outputs"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"src/server/prompts/templates.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true

# Align isort with formatter: split-on-trailing-comma + skip-magic-trailing-comma disagree
[tool.ruff.lint.isort]
split-on-trailing-comma = false
