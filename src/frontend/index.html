<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const STORAGE_KEY = 'agentic-invest-ui-state-v1';

const NOW = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
};

const AGENTS = [
  { id:'O', name:'Planning',     color:'var(--agent-O)' },
  { id:'R', name:'Research',     color:'var(--agent-R)' },
  { id:'F', name:'Fundamental',  color:'var(--agent-F)' },
  { id:'X', name:'Macro',        color:'#8b5cf6' },
  { id:'M', name:'Sentiment',    color:'var(--agent-M)' },
  { id:'G', name:'LLM Judge',    color:'#f59e0b' },
  { id:'S', name:'Scenarios',    color:'var(--agent-S)' },
  { id:'D', name:'Debate',       color:'#06b6d4' },
  { id:'V', name:'Report',       color:'var(--agent-V)' },
];

const AGENT_ID_BY_NAME = {
  planner: 'O',
  research: 'R',
  fundamental_analysis: 'F',
  macro_analysis: 'X',
  market_sentiment: 'M',
  llm_judge: 'G',
  scenario_scoring: 'S',
  scenario_debate: 'D',
  report_finalize: 'V',
};

const isStandbyLifecycle = (lifecycle) => !lifecycle || lifecycle === 'standby';
const isActiveLifecycle = (lifecycle) => lifecycle === 'active';
const isWaitingLifecycle = (lifecycle) => lifecycle === 'waiting';
const isBlockedLifecycle = (lifecycle) => lifecycle === 'blocked';
const isDegradedLifecycle = (lifecycle) => lifecycle === 'degraded';
const isFailedLifecycle = (lifecycle) => lifecycle === 'failed';
const deriveExecutionPhase = (agentState) => {
  const lifecycle = agentState?.lifecycle || 'standby';
  if (isFailedLifecycle(lifecycle)) return 'FAILED';
  if (isDegradedLifecycle(lifecycle)) return 'DEGRADED';
  if (isBlockedLifecycle(lifecycle)) return 'BLOCKED';
  if (isStandbyLifecycle(lifecycle)) return 'STANDBY';
  if (isWaitingLifecycle(lifecycle) || agentState?.waiting_on) return 'WAITING';
  if (isActiveLifecycle(lifecycle)) return 'ACTIVE';
  return String(lifecycle || 'STANDBY').toUpperCase();
};

const formatPct = (value) => `${Math.round((Number(value) || 0) * 100)}%`;
const shortenModel = (model) => {
  if (!model) return 'unknown-model';
  const m = model.toLowerCase();
  if (m.includes('gpt-oss')) return 'gpt-oss';
  if (m.includes('qwen3')) return 'qwen3';
  if (m.includes('llama-3.3')) return 'llama3.3';
  if (m.includes('gemma-3')) return 'gemma3';
  const base = model.split('/').pop() || model;
  return base
    .replace(':free', '')
    .replace('-a3b-instruct', '')
    .replace('-instruct', '')
    .replace('-it', '');
};

/** Strip inline md for plain-text summary snippets (Executive Summary hero). */
function stripMarkdownLite(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/[*_~>#-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

/** Lead (lines before first bullet) + up to 5 `-`/`*` bullets. Used only by SummarySection `narrativeContent` (section body, not full report). */
function parseExecutiveSummaryParts(raw) {
  const text = (raw || '').trim();
  if (!text) return { lead: '', points: [] };
  const lines = text.split(/\r?\n/).map((l) => l.trim()).filter((l) => l.length > 0);
  const bulletIdx = lines.findIndex((l) => /^\s*[-*]\s+/.test(l));
  if (bulletIdx === -1) {
    return { lead: '', points: [] };
  }
  const leadRaw = lines.slice(0, bulletIdx).join('\n');
  const lead = (stripMarkdownLite(leadRaw) || '').trim();
  const points = lines
    .slice(bulletIdx)
    .filter((l) => /^\s*[-*]\s+/.test(l))
    .map((l) => stripMarkdownLite(l.replace(/^\s*[-*]\s+/, '')))
    .filter(Boolean)
    .slice(0, 5);
  return { lead, points };
}

/** Normalize for comparing UI section title ↔ duplicate markdown heading echoed by the model */
function _normHeadingForDedupe(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}

/** Remove leading # / ## headings that duplicate the section title rendered in CSS */
function stripRedundantMarkdownTitle(raw, title) {
  if (!raw || !title) return raw || '';
  let text = raw.replace(/^\uFEFF/, '');
  for (let n = 0; n < 12; n += 1) {
    const lines = text.split('\n');
    let i = 0;
    while (i < lines.length && !lines[i].trim()) i += 1;
    if (i >= lines.length) break;
    const trimmed = lines[i].trim();
    const hm = trimmed.match(/^#{1,6}\s+(.+)$/);
    if (!hm) break;
    const inner = hm[1].replace(/\*{2}|`/g, '').trim();
    const t1 = _normHeadingForDedupe(title);
    const t2 = _normHeadingForDedupe(inner);
    let dup = Boolean(t2 && (t1 === t2 || t1.includes(t2) || t2.includes(t1)));
    if (!dup && t2 && t1 && t2.length >= 16 && t1.length >= 16) {
      const pref = Math.min(t1.length, t2.length, 28);
      dup = t1.slice(0, pref) === t2.slice(0, pref);
    }
    if (dup) {
      lines.splice(i, 1);
      text = lines.join('\n');
      continue;
    }
    break;
  }
  return text;
}

/** Strip GFM-style table rows so narrative blocks don't absorb them (tables render below). */
function stripMarkdownTableBlocks(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    if (lines[i].trim().startsWith('|')) {
      while (i < lines.length && lines[i].trim().startsWith('|')) i += 1;
      continue;
    }
    out.push(lines[i]);
    i += 1;
  }
  return out.join('\n').trim();
}

/** Paragraphs separated by blank lines, or markdown bullet lists → one UI row each (aligned with claim rows). */
function buildNarrativePointRows(body) {
  if (!body) return [];
  const chunks = body.split(/\n\s*\n+/).map((c) => c.trim()).filter(Boolean);
  const rows = [];
  for (const chunk of chunks) {
    const chunkLines = chunk.split('\n').map((l) => l.trim()).filter(Boolean);
    const allBullets =
      chunkLines.length > 0 && chunkLines.every((l) => /^[-*]\s+/.test(l));
    if (allBullets) {
      chunkLines.forEach((l) => rows.push(l.replace(/^[-*]\s+/, '').trim()));
    } else {
      rows.push(chunk.replace(/\s*\n\s*/g, ' ').trim());
    }
  }
  return rows;
}

/** Light cleanup of **bold** markers for monospace narrative display */
function stripInlineMdMarkers(s) {
  return String(s || '').replace(/\*\*([^*]+)\*\*/g, '$1');
}

const metricGroupsFromAnalysis = (analysis) => {
  const metrics = analysis?.metrics || {};
  return Object.entries(metrics).map(([group, value]) => {
    if (!value || typeof value !== 'object' || Array.isArray(value)) return null;
    const entries = Object.entries(value);
    const hasConcreteValue = entries.some(([, v]) => v !== null && v !== undefined && v !== '');
    const items = hasConcreteValue
      ? entries.map(([k, v]) => ({ k, v: String(v ?? 'N/A') }))
      : [{ k: 'status', v: 'Data unavailable' }];
    return { group, items };
  }).filter(Boolean);
};

// Highlight numbers/percentages/multiples inline in claim text
const NUM_RE = /(\$[\d,.]+[BMKTbmkt]?|\d+\.?\d*[xX]|\+?\-?\d+\.?\d*\s*(?:bps|pp|%)|[\d,.]+\s*(?:billion|million|trillion))/g;
const NUM_PART_RE = /^(\$[\d,.]+[BMKTbmkt]?|\d+\.?\d*[xX]|\+?\-?\d+\.?\d*\s*(?:bps|pp|%)|[\d,.]+\s*(?:billion|million|trillion))$/;
const highlightNumbers = (text) => {
  if (!text) return null;
  const parts = text.split(NUM_RE);
  return parts.map((part, i) =>
    NUM_PART_RE.test(part)
      ? <span key={i} className="data-chip">{part}</span>
      : part
  );
};
const MAGNITUDE_RE = /^(bearish|bullish)-([123])$|^(neutral)$/;
const scenarioColorClass = (tags) => {
  const tag = (tags || []).find(t => MAGNITUDE_RE.test(t)) || 'neutral';
  return tag; // e.g. "bullish-2", "bearish-1", "neutral"
};
const scenarioAccentColor = (tags) => {
  const tag = (tags || []).find(t => MAGNITUDE_RE.test(t)) || 'neutral';
  if (tag.startsWith('bullish')) return 'var(--accent)';
  if (tag.startsWith('bearish')) return 'var(--err)';
  return 'var(--warn)';
};
const scenarioTagTone = (tag) => {
  const t = String(tag || '').toLowerCase();
  if (t.startsWith('bullish')) return 'bullish';
  if (t.startsWith('bearish')) return 'bearish';
  if (t.startsWith('neutral')) return 'neutral';
  return 'generic';
};
// Extract a section's Markdown content by heading title (export fallback only)
const extractMarkdownSection = (markdown, title) => {
  if (!markdown || !title) return '';
  const escaped = title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(?:^|\\n)#{1,3}\\s*${escaped}\\s*\\n([\\s\\S]*?)(?=\\n#{1,3}\\s|$)`, 'i');
  const m = markdown.match(re);
  return m ? m[1].trim() : '';
};

const classifyErrorType = (rawError) => {
  const msg = String(rawError || '').toLowerCase();
  if (!msg) return '';
  if (msg.includes('http 429')) return 'HTTP_429';
  if (msg.includes('http 5')) return 'HTTP_5XX';
  if (msg.includes('http 4')) return 'HTTP_4XX';
  if (msg.includes('invalid json')) return 'INVALID_JSON';
  if (msg.includes('timeout')) return 'TIMEOUT';
  if (msg.includes('network')) return 'NETWORK';
  if (msg.includes('empty content')) return 'EMPTY_CONTENT';
  if (msg.includes('api error')) return 'API_ERROR';
  return 'UNKNOWN_ERROR';
};

const LLM_STATUS_PREFIX = {
  calling:  '→',
  success:  '✓',
  retry:    '⚠ RETRY',
  failed:   '✗ FAILED',
};

const formatLLMCallLog = (item) => {
  const status = item.status || 'unknown';
  const prefix = LLM_STATUS_PREFIX[status] || status.toUpperCase();
  const model = shortenModel(item.model);
  const attempt = item.attempt || 1;
  const attemptText = attempt >= 2 ? ` attempt ${attempt}` : '';
  const latency = Number.isFinite(item.latency_ms) ? ` ${item.latency_ms}ms` : '';
  const errorType = classifyErrorType(item.error);
  const error = errorType ? ` · ${errorType}` : '';
  const tokens = (item.prompt_tokens != null && item.completion_tokens != null)
    ? ` · ${item.prompt_tokens}+${item.completion_tokens}tok` : '';
  const cost = item.cost_usd != null
    ? ` · $${item.cost_usd < 0.001 ? (item.cost_usd * 1000).toFixed(3) + 'm' : item.cost_usd.toFixed(4)}` : '';
  return `${prefix} ${model}${attemptText}${latency}${tokens}${cost}${error}`;
};

const mergeLLMCallById = (prev, nextItem) => {
  const nextId = nextItem?.id;
  if (!nextId) return [...prev, nextItem];
  const idx = prev.findLastIndex((item) => item?.id === nextId);
  if (idx === -1) return [...prev, nextItem];
  const next = [...prev];
  next[idx] = { ...next[idx], ...nextItem };
  return next;
};

function AgentRow({ agent, lifecycle, phase, action, waitingOn, progressHint }) {
  const currentLifecycle = lifecycle || 'standby';
  const label = deriveExecutionPhase({ lifecycle: currentLifecycle, waiting_on: waitingOn });
  const isEngaged = label === 'ACTIVE' || label === 'WAITING';
  const rowClass = isEngaged ? 'active' : '';
  const dotClass = label === 'STANDBY' ? 'idle' : label === 'FAILED' ? 'failed' : label === 'DEGRADED' ? 'degraded' : 'running';
  const tagClass =
    label === 'STANDBY'  ? 'tag-standby'  :
    label === 'FAILED'   ? 'tag-failed'   :
    label === 'DEGRADED' ? 'tag-degraded' :
    label === 'WAITING' || label === 'BLOCKED' ? 'tag-waiting' :
    'tag-active';
  const phaseText = phase ? phase.replaceAll('_', ' ') : 'idle';
  const actionText = waitingOn
    ? `${action || phaseText} (${waitingOn})`
    : progressHint
    ? `${action || phaseText} · ${progressHint}`
    : action || phaseText;
  return (
    <div className={`agent-row ${rowClass}`}>
      <span className={`agent-dot ${dotClass}`} style={{background: label === 'STANDBY' ? undefined : agent.color}}></span>
      <span className="agent-name" style={{color: label === 'STANDBY' ? undefined : agent.color}}>{agent.name}</span>
      <span className="agent-action">{actionText}</span>
      <span className={`agent-status-tag ${tagClass}`}>{label}</span>
    </div>
  );
}

function LogLine({ time, agentId, msg }) {
  const agent = AGENTS.find(a => a.id === agentId);
  const msgColor = msg.startsWith('✗') || msg.startsWith('error:') ? 'var(--err)'
    : msg.startsWith('⚠') ? 'var(--warn)'
    : msg.startsWith('✓') ? 'var(--accent)'
    : undefined;
  return (
    <div className="log-line">
      <span className="log-time">{time}</span>
      {agent && <span className="log-agent" style={{color: agent.color}}>[{agent.name.slice(0,6).toUpperCase()}]</span>}
      {!agent && <span className="log-agent" style={{color:'var(--accent)'}}>[SYSTEM]</span>}
      <span className="log-msg" style={msgColor ? {color: msgColor} : undefined}>{msg}</span>
    </div>
  );
}

function SectionLabel({ children }) {
  return <div className="section-label">{children}</div>;
}

function DegradedBanner({ label }) {
  return (
    <div className="degraded-banner">
      <span className="degraded-icon">⚠</span>
      <span>{label || 'Analysis unavailable — LLM exhausted. Data shown is a placeholder.'}</span>
    </div>
  );
}

const SECTION_HANDLED_WARNING_PREFIXES = [
  'fundamental_analysis unavailable:',
  'macro_analysis unavailable:',
  'market_sentiment unavailable:',
  'scenario_debate unavailable:',
  'llm_judge unavailable:',
];

function IntentSection({ intent }) {
  if (!intent) return null;
  const outputs = Array.isArray(intent.required_outputs) ? intent.required_outputs : [];
  return (
    <div className="report-section">
      <SectionLabel>Intent</SectionLabel>
      <div className="section-title">Research Intent</div>
      <div className="intent-grid">
        <div className="intent-tag"><span className="intent-key">type</span><span className="intent-val">{intent.intent || 'investment_research'}</span></div>
        <div className="intent-tag"><span className="intent-key">subject</span><span className="intent-val">{intent.subjects?.[0] || 'N/A'}</span></div>
        <div className="intent-tag"><span className="intent-key">horizon</span><span className="intent-val">{intent.time_horizon || 'unspecified'}</span></div>
        <div className="intent-tag"><span className="intent-key">risk</span><span className="intent-val">{intent.risk_level || 'N/A'}</span></div>
        <div className="intent-tag"><span className="intent-key">scope</span><span className="intent-val">{intent.scope}</span></div>
        {outputs.map(o => (
          <div key={o} className="intent-tag"><span className="intent-key">output</span><span className="intent-val">{o}</span></div>
        ))}
      </div>
    </div>
  );
}

function EvidenceSection({ evidence }) {
  const items = Array.isArray(evidence) ? evidence : [];
  return (
    <div className="report-section">
      <SectionLabel>Evidence</SectionLabel>
      <div className="section-title">Key Sources</div>
      <div className="evidence-table-wrap">
        <table className="evidence-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Type</th>
              <th>Reliability</th>
            </tr>
          </thead>
          <tbody>
            {items.map(ev => (
              <tr key={ev.id}>
                <td>{ev.id || '-'}</td>
                <td>
                  {ev.url ? (
                    <a href={ev.url} target="_blank" rel="noreferrer">{ev.title || 'Untitled source'}</a>
                  ) : (
                    ev.title || 'Untitled source'
                  )}
                </td>
                <td>{ev.source_type || 'source'}</td>
                <td>
                  <span className={`ev-reliability ${ev.reliability || 'medium'}`}>
                    {(ev.reliability || 'medium').toUpperCase()}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SkeletonLine({ w = 'w-full' }) {
  return <div className={`skeleton-block skeleton-line ${w}`} />;
}
function SkeletonSection({ label, title, children }) {
  return (
    <div className="skeleton-section">
      <SectionLabel>{label}</SectionLabel>
      <div className="skeleton-block skeleton-line w-half" style={{marginBottom:'14px', height:'13px'}} />
      {children}
    </div>
  );
}

function FundamentalSection({ analysis, sectionTitle, loading }) {
  if (loading) return (
    <SkeletonSection label={sectionTitle || 'Fundamental Analysis'}>
      <SkeletonLine w="w-3q" /><SkeletonLine w="w-full" /><SkeletonLine w="w-half" />
      <SkeletonLine w="w-full" style={{marginTop:'10px'}} /><SkeletonLine w="w-3q" />
    </SkeletonSection>
  );
  const claims = Array.isArray(analysis?.claims) ? analysis.claims : [];
  const risks = Array.isArray(analysis?.fundamental_risks) ? analysis.fundamental_risks : [];
  const bqView = analysis?.business_quality?.view;
  const valView = analysis?.valuation?.relative_multiple_view;
  const isDegraded = analysis?.degraded === true;
  return (
    <div className="report-section">
      <SectionLabel>{sectionTitle || 'Fundamental Analysis'}</SectionLabel>
      <div className="section-title">{sectionTitle || 'Business & Financials'}</div>
      {isDegraded
        ? <DegradedBanner label="LLM failed: fundamental analysis unavailable." />
        : <>
          {(bqView || valView) && (
            <div className="analysis-meta-row">
              {bqView && <span className={`quality-badge quality-${bqView}`}>{bqView}</span>}
              {valView && <span className="valuation-note">{highlightNumbers(valView)}</span>}
            </div>
          )}
          <div className="claim-list">
            {claims.map((c, i) => (
              <div key={i} className={`claim-item conf-${c.confidence}`}>
                <span className={`conf-bar conf-${c.confidence}`} />
                <span className="claim-text">{highlightNumbers(c.statement)}</span>
              </div>
            ))}
          </div>
          {risks.length > 0 && (
            <div className="risk-list">
              {risks.map((r, i) => (
                <div key={i} className={`risk-item impact-${r.impact}`}>
                  <span className="risk-name">{r.name}</span>
                  <span className="risk-signal">{r.signal}</span>
                </div>
              ))}
            </div>
          )}
        </>
      }
    </div>
  );
}

function SentimentSection({ sentiment, sectionTitle, loading }) {
  if (loading) return (
    <SkeletonSection label={sectionTitle || 'Market Sentiment'}>
      <SkeletonLine w="w-3q" /><SkeletonLine w="w-full" /><SkeletonLine w="w-half" />
      <SkeletonLine w="w-full" style={{marginTop:'10px'}} /><SkeletonLine w="w-3q" />
    </SkeletonSection>
  );
  const claims = Array.isArray(sentiment?.claims) ? sentiment.claims : [];
  const risks = Array.isArray(sentiment?.sentiment_risks) ? sentiment.sentiment_risks : [];
  const direction = sentiment?.news_sentiment?.direction;
  const pa = sentiment?.price_action;
  const narrative = sentiment?.market_narrative?.summary;
  const isSentimentDegraded = sentiment?.degraded === true;
  return (
    <div className="report-section">
      <SectionLabel>{sectionTitle || 'Market Sentiment'}</SectionLabel>
      <div className="section-title">{sectionTitle || 'Sentiment & Price Action'}</div>
      {isSentimentDegraded
        ? <DegradedBanner label="LLM failed: market sentiment unavailable." />
        : <>
          <div className="analysis-meta-row">
            {direction && <span className={`sentiment-badge dir-${direction}`}>{direction}</span>}
            {pa?.return_30d_pct != null && (
              <span className={`data-chip ${pa.return_30d_pct >= 0 ? 'chip-pos' : 'chip-neg'}`}>
                {pa.return_30d_pct >= 0 ? '+' : ''}{pa.return_30d_pct.toFixed(1)}% 30d
              </span>
            )}
            {pa?.volatility && <span className="conf-label">vol: {pa.volatility}</span>}
          </div>
          {narrative && <div className="section-body narrative-line">{narrative}</div>}
          <div className="claim-list">
            {claims.map((c, i) => (
              <div key={i} className={`claim-item conf-${c.confidence}`}>
                <span className={`conf-bar conf-${c.confidence}`} />
                <span className="claim-text">{highlightNumbers(c.statement)}</span>
              </div>
            ))}
          </div>
          {risks.length > 0 && (
            <div className="risk-list">
              {risks.map((r, i) => (
                <div key={i} className={`risk-item impact-${r.impact}`}>
                  <span className="risk-name">{r.name}</span>
                  <span className="risk-signal">{r.signal}</span>
                </div>
              ))}
            </div>
          )}
        </>
      }
    </div>
  );
}

function MacroSection({ macro, sectionTitle, loading }) {
  if (loading) return (
    <SkeletonSection label={sectionTitle || 'Macro Environment'}>
      <SkeletonLine w="w-full" /><SkeletonLine w="w-3q" />
      <SkeletonLine w="w-full" style={{marginTop:'10px'}} /><SkeletonLine w="w-3q" /><SkeletonLine w="w-half" />
    </SkeletonSection>
  );
  const drivers = Array.isArray(macro?.macro_drivers) ? macro.macro_drivers : [];
  const risks = Array.isArray(macro?.macro_risks) ? macro.macro_risks : [];
  const isMacroDegraded = macro?.degraded === true;
  return (
    <div className="report-section">
      <SectionLabel>{sectionTitle || 'Macro Environment'}</SectionLabel>
      <div className="section-title">{sectionTitle || 'Macro Regime'}</div>
      {isMacroDegraded
        ? <DegradedBanner label="LLM failed: macro analysis unavailable." />
        : <>
          <div className="analysis-meta-row">
            {macro?.rate_environment && <span className="intent-tag"><span className="intent-key">rate</span><span className="intent-val">{macro.rate_environment}</span></span>}

            <div className="skeleton-block skeleton-line w-2q" style={{height:'13px'}} />

          const colorClass = scenarioColorClass(s.tags);
          const accentColor = scenarioAccentColor(s.tags);

          const domainTags = (s.tags || []).filter(t => !MAGNITUDE_RE.test(t));
          return (
          <div className={`scenario-card ${colorClass}`} key={s.id || `${s.name}-${idx}`}>

              <span className="scenario-name" style={{color: accentColor}}>{s.name}</span>
              <span className="scenario-pct" style={{color: accentColor}}>{formatPct(pct)}</span>

                >
                  {t}

      <div style={{marginTop:'12px'}}>
        {[0,1,2].map(i => (

            <div className="skeleton-block skeleton-cell" />

function MarkdownSection({ section, content }) {
  const rawFull = stripRedundantMarkdownTitle(content || '', section?.title || '');
  const bodyOnly = stripMarkdownTableBlocks(rawFull);
  const pointRows = buildNarrativePointRows(bodyOnly);
  return (
    <div className="report-section markdown-narrative-section">
      <SectionLabel>{section.title}</SectionLabel>
      <div className="section-title">{section.title}</div>
      {pointRows.length === 0 && (
        <div className="section-body" style={{color:'var(--muted)'}}>No content available for this section.</div>
      )}
      {pointRows.length > 0 && (
        <div className="narrative-point-list">
          {pointRows.map((rowText, i) => (
            <div key={i} className="narrative-point-row">
              <span className="narrative-point-bar" aria-hidden="true" />
              <div className="narrative-point-text">{stripInlineMdMarkers(rowText)}</div>
            </div>
          ))}
        </div>
      )}
      {(() => {
        const tableLines = rawFull.split('\n').filter((l) => l.trim().startsWith('|'));
        if (tableLines.length < 2) return null;
        const headers = tableLines[0].split('|').map((h) => h.trim()).filter(Boolean);
        const rows = tableLines.slice(2).map((r) => r.split('|').map((c) => c.trim()).filter(Boolean));
        if (!headers.length) return null;
        return (
          <div className="evidence-table-wrap narrative-table-follow" style={{marginTop:'8px'}}>
            <table className="evidence-table">
              <thead><tr>{headers.map((h, hi) => <th key={hi}>{h}</th>)}</tr></thead>
              <tbody>{rows.map((row, ri) => (
                <tr key={ri}>{row.map((cell, ci) => <td key={ci}>{cell}</td>)}</tr>
              ))}</tbody>
            </table>
          </div>
        );
      })()}
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [appState, setAppState] = useState('idle');
  const [query, setQuery] = useState('');
  const [agentStatuses, setAgentStatuses] = useState({});
  const [logLines, setLogLines] = useState([]);
  const [reportData, setReportData] = useState(null);
  const [llmCalls, setLlmCalls] = useState([]);
  const [nowMs, setNowMs] = useState(Date.now());  // still needed for elapsed timer
  const [runStartMs, setRunStartMs] = useState(null);
  const [totalElapsedSec, setTotalElapsedSec] = useState(null);
  const logRef = useRef(null);
  const streamResearchRef = useRef(null);
  const hydratedRef = useRef(false);
  const warnedUnknownSectionsRef = useRef(new Set());

  const applyAgentStatuses = useCallback((statuses) => {
    if (!Array.isArray(statuses)) return;
    setAgentStatuses((prev) => {
      const merged = { ...prev };
      statuses.forEach((item) => {
        const id = AGENT_ID_BY_NAME[item.agent];
        if (!id) return;
        merged[id] = {
          lifecycle: item.lifecycle,
          phase: item.phase,
          action: item.action,
          waiting_on: item.waiting_on || '',
          progress_hint: item.progress_hint || '',
          last_update_at: item.last_update_at || '',
        };
      });
      return merged;
    });
  }, []);

  const streamResearch = useCallback(async (q) => {
    const response = await fetch('/research/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Accept: 'text/event-stream',
      },
      body: JSON.stringify({ query: q }),
    });

    if (!response.ok || !response.body) {
      let detail = 'Research stream request failed.';
      try {
        const payload = await response.json();
        detail = payload?.detail || detail;
      } catch (_err) {}
      throw new Error(detail);
    }

    const decoder = new TextDecoder();
    const reader = response.body.getReader();
    let buffer = '';
    let gotFinal = false;
    let gotError = false;
    let gotDone = false;

    const processBlock = (block) => {
      const lines = block.split('\n');
      let eventName = 'message';
      const dataParts = [];
      for (const line of lines) {
        if (line.startsWith('event:')) eventName = line.slice(6).trim();
        else if (line.startsWith('data:')) dataParts.push(line.slice(5));
      }
      const dataPayload = dataParts.join('\n').trim();
      if (!dataPayload) return;

      let parsed;
      try {
        parsed = JSON.parse(dataPayload);
      } catch (_err) {
        return;
      }

      if (eventName === 'agent_status') {
        applyAgentStatuses(parsed);
        return;
      }

      if (eventName === 'error') {
        const message = parsed?.message || 'Unknown stream error';
        gotError = true;
        setAppState('error');
        setLogLines((prev) => [...prev, { time: NOW(), agentId: null, msg: `error: ${message}` }]);
        return;
      }

      if (eventName === 'llm_call') {
        setLlmCalls((prev) => mergeLLMCallById(prev, parsed));
        const agentId = parsed?.agent_tag || AGENT_ID_BY_NAME[parsed?.node] || null;
        const callId = parsed?.id;
        const msg = formatLLMCallLog(parsed);
        setLogLines((prev) => {
          const idx = callId ? prev.findLastIndex(l => l.callId === callId) : -1;
          if (idx !== -1) {
            const next = [...prev];
            next[idx] = { ...next[idx], msg };
            return next;
          }
          return [...prev, { time: NOW(), agentId, msg, callId }];
        });
        return;
      }

      if (eventName === 'final') {
        gotFinal = true;
        setReportData(parsed);
        if (Array.isArray(parsed?.llm_calls) && parsed.llm_calls.length > 0) {
          setLlmCalls((prev) => parsed.llm_calls.reduce(mergeLLMCallById, prev));
        }
        setAppState('complete');
        return;
      }

      if (eventName === 'done') {
        gotDone = true;
        return;
      }
    };

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let boundary = buffer.indexOf('\n\n');
      while (boundary !== -1) {
        const block = buffer.slice(0, boundary);
        buffer = buffer.slice(boundary + 2);
        processBlock(block);
        boundary = buffer.indexOf('\n\n');
      }
    }

    if (!gotFinal && !gotError) {
      const err = new Error(
        gotDone
          ? 'Research stream finished before final report (likely cancelled/interrupted).'
          : 'Stream ended without final report.'
      );
      if (gotDone) err.code = 'STREAM_DONE_WITHOUT_FINAL';
      throw err;
    }
  }, [applyAgentStatuses]);
  streamResearchRef.current = streamResearch;

  const runResearch = useCallback(async () => {
    const trimmed = query.trim();
    if (!trimmed) return;

    const startMs = Date.now();
    setRunStartMs(startMs);
    setTotalElapsedSec(null);
    setAppState('running');
    setAgentStatuses({});
    setLogLines([]);
    setReportData(null);
    setLlmCalls([]);
    warnedUnknownSectionsRef.current = new Set();

    try {
      await streamResearch(trimmed);
    } catch (error) {
      setAppState('error');
      const msg = error?.code === 'STREAM_DONE_WITHOUT_FINAL'
        ? `run cancelled: ${error.message}`
        : `run failed: ${error.message || 'Unknown stream error'}`;
      setLogLines((prev) => [...prev, { time: NOW(), agentId: null, msg }]);
    } finally {
      setTotalElapsedSec(Math.round((Date.now() - startMs) / 1000));
    }
  }, [query, streamResearch]);

  // hydrate UI snapshot after refresh
  useEffect(() => {
    if (hydratedRef.current) return;
    hydratedRef.current = true;
    try {
      const raw = sessionStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const snap = JSON.parse(raw);
      if (typeof snap.query === 'string') setQuery(snap.query);
      if (snap.agentStatuses && typeof snap.agentStatuses === 'object') setAgentStatuses(snap.agentStatuses);
      if (Array.isArray(snap.logLines)) setLogLines(snap.logLines);
      if (Array.isArray(snap.llmCalls)) setLlmCalls(snap.llmCalls);
      if (snap.reportData && typeof snap.reportData === 'object') setReportData(snap.reportData);
      // Transient states don't survive a tab close — treat as idle on restore
      const restoredState = snap.appState === 'complete' ? 'complete' : 'idle';
      setAppState(restoredState);
    } catch (_e) {
      // ignore bad persisted snapshot
    }
  }, []);

  // persist UI snapshot continuously
  useEffect(() => {
    try {
      const snapshot = {
        appState,
        query,
        agentStatuses,
        logLines,
        llmCalls,
        reportData,
      };
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    } catch (_e) {
      // ignore storage quota / serialization errors
    }
  }, [appState, query, agentStatuses, logLines, llmCalls, reportData]);

  // Auto-scroll log
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logLines]);

  useEffect(() => {
    const timer = setInterval(() => setNowMs(Date.now()), 1000);
    return () => clearInterval(timer);
  }, []);

  const handleKey = (e) => { if (e.key === 'Enter') runResearch(); };

  const activeCount = Object.values(agentStatuses).filter((s) => deriveExecutionPhase(s) === 'ACTIVE').length;
  const waitingCount = Object.values(agentStatuses).filter((s) => deriveExecutionPhase(s) === 'WAITING').length;
  const isValid = reportData?.validation_result?.is_valid;
  const validationWarnings = (reportData?.validation_result?.warnings || []).filter(
    (w) => !SECTION_HANDLED_WARNING_PREFIXES.some((prefix) => String(w).startsWith(prefix))
  );
  const llmCalling = llmCalls.filter(c => c?.status === 'calling').length;
  const llmRetry = llmCalls.filter(c => c?.status === 'retry').length;
  const llmFailed = llmCalls.filter(c => c?.status === 'failed').length;
  const totalCostUsd = reportData?.total_cost_usd ?? null;
  const totalPromptTokens = reportData?.total_prompt_tokens ?? 0;
  const totalCompletionTokens = reportData?.total_completion_tokens ?? 0;
  const formatCost = (usd) => usd == null ? '' : usd < 0.001 ? `$${(usd * 1000).toFixed(3)}m` : `$${usd.toFixed(4)}`;
  const macroData = reportData?.macro_analysis || reportData?.report_json?.macro_analysis || null;
  const debateData = reportData?.scenario_debate || reportData?.report_json?.scenario_debate || null;
  const reportPlanSections = reportData?.report_json?.report_plan?.sections || null;
  // Merge nested + top-level narratives: `{}` at top level is truthy so `a || b` skips `b`
  // and drops custom markdown that only exists under report_json — merge fills gaps instead.
  const narrativeNested = reportData?.report_json?.narrative_sections;
  const narrativeTop = reportData?.narrative_sections;
  const narrativeSections = {
    ...(typeof narrativeNested === 'object' && narrativeNested !== null ? narrativeNested : {}),
    ...(typeof narrativeTop === 'object' && narrativeTop !== null ? narrativeTop : {}),
  };
  const declaredCustom = reportData?.report_json?.custom_sections || [];
  // Custom sections: order follows plan; body text comes from merged narrative_sections.
  const customSectionBlocks = declaredCustom.map((c) => {
    const cid = (c?.id ?? c?.section_id ?? '').trim();
    const title = c?.title || cid.replace(/_/g, ' ') || 'Custom section';
    return {
      id: cid,
      title,
      content: cid ? (narrativeSections[cid] || '') : '',
    };
  });
  const planTailIds = new Set(['conclusion']);
  const reportPlanMain = (reportPlanSections || []).filter((s) => !planTailIds.has(s.id));
  const reportPlanTail = (reportPlanSections || []).filter((s) => planTailIds.has(s.id));
  const showFullReport = appState === 'complete' && reportData;

  function renderPlanSection(section) {
    const src = section.source;
    const narrativeContent = narrativeSections[section.id] || '';
    const isLoading = false;
    if (src === 'fundamental_analysis') return <FundamentalSection key={section.id} analysis={reportData?.fundamental_analysis} sectionTitle={section.title} loading={isLoading} />;
    if (src === 'macro_analysis')       return <MacroSection       key={section.id} macro={macroData}                           sectionTitle={section.title} loading={isLoading} />;
    if (src === 'market_sentiment')     return <SentimentSection   key={section.id} sentiment={reportData?.market_sentiment}    sectionTitle={section.title} loading={isLoading} />;
    if (src === 'scenarios')            return <ScenariosSection   key={section.id} scenarios={reportData?.scenarios}           loading={isLoading} />;
    if (src === 'scenario_debate')      return <DebateSection      key={section.id} debate={debateData}                         loading={isLoading} />;
    if (src === 'evidence')             return <EvidenceSection    key={section.id} evidence={reportData?.evidence} />;
    if (section.id === 'executive_summary') return <SummarySection key={section.id} validationBadge={validationBadge} narrativeContent={narrativeContent} intent={reportData?.intent} />;
    if (src === 'all' || src === 'custom') return <MarkdownSection key={section.id} section={section} content={narrativeContent} />;
    if (!warnedUnknownSectionsRef.current.has(section.id)) {
      warnedUnknownSectionsRef.current.add(section.id);
      console.warn('Unknown report_plan section skipped', { id: section.id, source: src, title: section.title });
    }
    return null;
  }

  const liveElapsedSec = (appState === 'running' && runStartMs)
    ? Math.floor((nowMs - runStartMs) / 1000)
    : null;
  const displayElapsed = totalElapsedSec != null ? totalElapsedSec : liveElapsedSec;
  const formatElapsed = (s) => s == null ? null : s >= 60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;

  const validationBadge = showFullReport ? (
    <div className={`validation-bar ${isValid ? 'valid' : 'review'}`}>
      <span>{isValid ? '✓' : '!'}</span><span>{isValid ? 'VALID' : 'REVIEW'}</span>
    </div>
  ) : null;

  return (
    <>
      {/* Top bar */}
      <div className="top-bar">
        <div className="top-wordmark">Investment Research</div>
        <div className="top-divider"></div>
        <div className="top-query-wrap">
          <input
            className="top-query-input"
            placeholder="Ask any investment question — e.g. Should I invest in NVDA for 5 years?"
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={handleKey}
            disabled={appState === 'running'}
          />
          <button
            className="run-btn"
            onClick={runResearch}
            disabled={appState === 'running' || !query.trim()}
          >
            {appState === 'running' ? 'RUNNING…' : 'RUN RESEARCH'}
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main-area">
        {/* Left panel */}
        <div className="left-panel">
          <div className="panel-header">
            <span className="panel-label">Agents</span>
            <span className="panel-count">
              {appState === 'idle' ? `${AGENTS.length} standby` : `${activeCount} active · ${waitingCount} waiting`}
            </span>
          </div>
          <div className="agent-list">
            {AGENTS.map(ag => (
              <AgentRow
                key={ag.id}
                agent={ag}
                lifecycle={agentStatuses[ag.id]?.lifecycle}
                phase={agentStatuses[ag.id]?.phase}
                action={agentStatuses[ag.id]?.action}
                waitingOn={agentStatuses[ag.id]?.waiting_on}
                progressHint={agentStatuses[ag.id]?.progress_hint}
              />
            ))}
          </div>
          <div className="log-area">
            <div className="panel-header">
              <span className="panel-label">Model Calls</span>
              <span className="panel-count">
                {llmCalls.length} calls · {llmRetry > 0 ? `${llmRetry} retry · ` : ''}{llmFailed > 0 ? `${llmFailed} failed · ` : ''}{totalCostUsd != null ? formatCost(totalCostUsd) : ''}
              </span>
            </div>
            <div className="log-box" ref={logRef}>
              {logLines.length === 0 && (
                <span className="log-empty">Awaiting model calls…</span>
              )}
              {logLines.map((l, i) => (
                <LogLine key={i} time={l.time} agentId={l.agentId} msg={l.msg} />
              ))}
            </div>
          </div>
        </div>

        {/* Right panel */}
        <div className="right-panel">
          {(appState === 'running' || appState === 'complete' || appState === 'error') && (
            <div className="report-footer">
              <span className={appState === 'running' ? 'stat-live' : ''}>
                {displayElapsed != null ? formatElapsed(displayElapsed) : '—'}
              </span>
              <span>{llmCalls.length > 0 ? `${llmCalls.length} calls` : '—'}{llmRetry > 0 ? ` · ${llmRetry} retry` : ''}{llmFailed > 0 ? ` · ${llmFailed} failed` : ''}</span>
              {totalCostUsd != null
                ? <span title={`${totalPromptTokens} prompt + ${totalCompletionTokens} completion tokens`}>{formatCost(totalCostUsd)} · {(totalPromptTokens + totalCompletionTokens).toLocaleString()} tok</span>
                : <span>—</span>
              }
              <span>{reportData?.evidence?.length > 0 ? `${reportData.evidence.length} sources` : '—'}</span>
              <span className={appState === 'complete' ? (isValid ? 'stat-valid' : 'stat-review') : ''}>
                {appState === 'complete' ? (isValid ? '✓ valid' : '! review') : 'Not financial advice'}
              </span>
            </div>
          )}
          {appState === 'idle' && (
            <div className="report-idle">
              <div className="report-idle-icon">◈</div>
              <div className="report-idle-text">Enter a query to begin research</div>
            </div>
          )}
          {(appState === 'running' || appState === 'error') && !showFullReport && (
            <div className="report-idle">
              <div className="report-idle-icon">◈</div>
              <div className="report-idle-text">
                {appState === 'error' ? 'Research run failed — see log for details' : 'Generating report…'}
              </div>
            </div>
          )}
          {showFullReport && (
            <div className="report-wrap">
              {reportData?.intent && <IntentSection intent={reportData.intent} />}

              {/* Degraded / validation warnings — shown once report is complete */}
              {appState === 'complete' && validationWarnings.length > 0 && (
                <div className="report-section warnings-section">
                  <SectionLabel>Report Quality</SectionLabel>
                  <div className="section-title">Warnings</div>
                  {validationWarnings.map((w, i) => (
                    <div key={i} className="warning-line">
                      <span className="warning-icon">⚠</span>
                      <span>{w}</span>
                    </div>
                  ))}
                </div>
              )}

              {Array.isArray(reportPlanSections) && reportPlanSections.length > 0 ? (
                <>
                  {reportPlanMain.map((section) => renderPlanSection(section))}
                  {customSectionBlocks.map((cs) => (
                    <MarkdownSection key={cs.id} section={{ id: cs.id, title: cs.title }} content={cs.content} />
                  ))}
                  {reportPlanTail.map((section) => renderPlanSection(section))}
                </>
              ) : (
                <>
                  <SummarySection validationBadge={validationBadge} narrativeContent={narrativeSections['executive_summary'] || ''} intent={reportData?.intent} />
                  {reportData?.fundamental_analysis && <FundamentalSection analysis={reportData.fundamental_analysis} />}
                  {macroData && <MacroSection macro={macroData} />}
                  {reportData?.market_sentiment && <SentimentSection sentiment={reportData.market_sentiment} />}
                  {reportData?.scenarios?.length > 0 && <ScenariosSection scenarios={reportData.scenarios} />}
                  {debateData && <DebateSection debate={debateData} />}
                  {customSectionBlocks.map((cs) => (
                    <MarkdownSection key={`fb-${cs.id}`} section={{ id: cs.id, title: cs.title }} content={cs.content} />
                  ))}
                  <MarkdownSection section={{ id: 'conclusion', title: 'Conclusion & What To Watch' }} content={narrativeSections['conclusion'] || ''} />
                </>
              )}

              {reportData?.evidence?.length > 0 && <EvidenceSection evidence={reportData.evidence} />}
            </div>
          )}
        </div>
      </div>

    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
